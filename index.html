<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <header class="navbar">
        <img src="" alt="agoodshop" class="shoplogo">
        <nav id="menu">
            <a href="#">Tienda</a>
            <a href="#">Accesorios</a>
            <a href="#">Soporte</a>
            <button id="contact-btn">Contactar</button>
        </nav>
    </header>
    <main class="container-shop">
            <section class="product-area">
                <div class="product-img">
                    <span id="green-tag">128gb</span>
                    <img src="SOURCES/svg_iphone_moen_aa.svg" alt="product image" id="img-product">
                </div>
                <div class="product-info">
                    <p id="red-tag">OFERTA</p>
                    <h2>Compra un iphone 13 Pro</h2>
                    <p>Descripción del producto en cuestión</p>
                    <div id="product-price">
                        <span id="price">999.99€</span>
                        <button id="buy-btn">Comprar</button>
                    </div>
                    <div id="product-shipping">
                        <span><img src="" alt="Caja">Envío rápido</span>
                        <span><img src="" alt="Devolución">Devoluciones fáciles</span>
                        <span><img src="" alt="Tarjeta">Pago a plazos</span>
                    </div>
                </div>
            </section>
    </main>
    <footer class="footer">
        <span>agoodshop</span>
        <span><a href="#">X</a></span>
        <span><a href="#">Instagram</a></span>
        <span><a href="#">Pinterest</a></span>
    </footer>
</body>
</html>
